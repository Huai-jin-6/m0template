# Select CMSIS-DAP interface
source [find interface/cmsis-dap.cfg]

# Force HID backend (compatible with Windows default HID driver)
# Remove this line if using WinUSB driver (via Zadig)
cmsis-dap backend hid   

# Select transport protocol
transport select swd

# Adapter speed (1000 kHz = 1 MHz, MSPM0 recommended 1-4 MHz)
adapter speed 4000000

# Select MSPM0 target (newer OpenOCD path)
source [find target/ti/mspm0.cfg]
